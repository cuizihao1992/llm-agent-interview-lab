<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Agent 面试机器人</title>
    <meta name="description" content="可安装的 LLM Agent 面试知识库对话机器人，本地记忆，可直连大模型。" />
    <meta name="theme-color" content="#1f2328" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Agent 面试" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="知识模块">
        <div class="brand">
          <span class="brand-mark">AI</span>
          <div>
            <strong>Agent 面试机器人</strong>
            <small>本地记忆 + 直连模型</small>
          </div>
        </div>

        <div class="status-card">
          <span id="model-status-dot" class="status-dot demo"></span>
          <div>
            <strong id="model-status-title">本地 Demo</strong>
            <small id="model-status-copy">未配置模型，使用内置知识回答。</small>
          </div>
        </div>

        <nav class="module-list" id="module-list" aria-label="模块快捷提问"></nav>

        <button id="install-button" class="secondary-button" type="button" hidden>安装到手机</button>
        <button id="settings-button" class="secondary-button" type="button">模型与记忆设置</button>
        <a class="repo-link" href="https://github.com/cuizihao1992/llm-agent-interview-lab">GitHub 仓库</a>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Mobile PWA MVP</p>
            <h1>大模型 Agent 面试陪练</h1>
          </div>
          <button id="clear-chat" class="icon-button" type="button" aria-label="清空对话">清空</button>
        </header>

        <section class="quick-start" aria-label="快捷问题">
          <button data-question="长期陪伴型 AI 的记忆机制怎么设计？" type="button">记忆机制</button>
          <button data-question="RAG 向量数据工程链路是什么？" type="button">RAG 工程</button>
          <button data-question="长上下文模型会取代 RAG 吗？" type="button">Long RAG</button>
          <button data-question="Transformer 处理超长上下文有哪些瓶颈？" type="button">长上下文优化</button>
        </section>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="chat-form">
          <textarea id="message-input" rows="1" placeholder="问一个面试题，比如：RAG 为什么要混合检索？"></textarea>
          <button type="submit">发送</button>
        </form>
      </main>
    </div>

    <dialog id="settings-dialog">
      <form method="dialog" class="settings-form">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Local App</p>
            <h2>模型与本地记忆</h2>
          </div>
          <button value="cancel" class="icon-button" type="submit" aria-label="关闭">关闭</button>
        </div>

        <label>
          OpenAI-compatible Base URL
          <input id="model-base-input" type="url" placeholder="https://api.openai.com/v1" />
        </label>
        <label>
          Model
          <input id="model-name-input" type="text" placeholder="gpt-4.1-mini" />
        </label>
        <label>
          API Key
          <input id="api-key-input" type="password" placeholder="sk-..." autocomplete="off" />
        </label>
        <label>
          添加用户画像事实
          <input id="profile-fact-input" type="text" placeholder="例如：我的目标是准备 Agent 算法面试" />
        </label>

        <p class="hint">
          当前版本不用后端，不做 RAG，不请求自己的服务器。设置、对话和记忆都保存在当前设备。只有配置 API Key 后，发送消息才会直连大模型接口。
        </p>

        <div id="fact-list" class="fact-list"></div>

        <div class="dialog-actions">
          <button id="save-fact-button" class="secondary-button" type="button">保存画像</button>
          <button id="save-settings-button" type="button">保存设置</button>
        </div>
      </form>
    </dialog>

    <script src="./main.js"></script>
  </body>
</html>
