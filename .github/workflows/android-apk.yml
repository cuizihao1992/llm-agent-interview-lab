name: Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: apps/flutter_agent_interview
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: apps/flutter_agent_interview
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: apps/flutter_agent_interview
        run: flutter test

      - name: Build release APK
        working-directory: apps/flutter_agent_interview
        run: flutter build apk --release

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp apps/flutter_agent_interview/build/app/outputs/flutter-apk/app-release.apk dist/agent-interview-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-interview-release-apk
          path: dist/agent-interview-release.apk

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/agent-interview-release.apk
